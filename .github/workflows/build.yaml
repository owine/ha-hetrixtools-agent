---
name: Build
"on":
  push:
    branches: [main]
    paths: ["hetrixtools-agent/**"]
  release:
    types: [published]
permissions:
  contents: read
jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Read app version
        id: meta
        run: |
          version="$(grep -E '^version:' hetrixtools-agent/config.yaml \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: '["amd64", "aarch64"]'
          image-name: hetrixtools-agent
          registry-prefix: ghcr.io/owine
  build:
    name: Build ${{ matrix.arch }}
    needs: init
    # Native per-arch runners (ubuntu-24.04 / ubuntu-24.04-arm) from the matrix:
    # build-image has no QEMU/platforms, so each arch builds on its own runner.
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write  # keyless cosign signing
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build & push ${{ matrix.arch }}
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          version: ${{ needs.init.outputs.version }}
          context: hetrixtools-agent
          # Base image is pinned (tag + digest) as the Dockerfile BUILD_FROM
          # default; buildx selects the arch from the multi-arch manifest.
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          # Push/sign only on a published release; branch pushes just build.
          push: ${{ github.event_name == 'release' }}
          cosign: ${{ github.event_name == 'release' }}
