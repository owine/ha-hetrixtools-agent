---
name: Build
"on":
  push:
    branches: [main]
    paths: ["hetrixtools-agent/**"]
  release:
    types: [published]
permissions:
  contents: read
env:
  # Single source of truth for the build matrix + image name (kept in sync
  # across the matrix and the manifest job).
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: hetrixtools-agent
jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read app version
        id: meta
        run: |
          version="$(grep -E '^version:' hetrixtools-agent/config.yaml \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ghcr.io/owine
  build:
    name: Build ${{ matrix.arch }}
    needs: init
    # Native per-arch runners (ubuntu-24.04 / ubuntu-24.04-arm) from the matrix:
    # build-image has no QEMU/platforms, so each arch builds on its own runner.
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write  # keyless cosign signing
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build & push ${{ matrix.arch }}
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          version: ${{ needs.init.outputs.version }}
          context: hetrixtools-agent
          # Base image is pinned (tag + digest) as the Dockerfile BUILD_FROM
          # default; buildx selects the arch from the multi-arch manifest.
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          # Push/sign only on a published release; branch pushes just build.
          push: ${{ github.event_name == 'release' }}
          cosign: ${{ github.event_name == 'release' }}
  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    # Only on a release: combine the per-arch images pushed above into the single
    # multi-arch manifest that config.yaml's `image:` points at (no {arch}).
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write  # keyless cosign signing of the manifest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
