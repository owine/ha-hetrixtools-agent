---
name: Lint
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual re-run lever if GitHub drops a pull_request event
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint all
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # shellcheck and yamllint are pre-installed on the ubuntu-24.04 runner image,
      # so they are invoked directly rather than reinstalled.
      - name: shellcheck
        run: |
          shellcheck --version
          shellcheck -x hetrixtools-agent/rootfs/usr/lib/hetrixtools/render-config.sh
          shellcheck -s bash hetrixtools-agent/rootfs/etc/s6-overlay/s6-rc.d/hetrixtools/run
          shellcheck tests/smoke.sh
      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: hetrixtools-agent/Dockerfile
          config: .hadolint.yaml
          failure-threshold: error
      - name: yamllint
        run: |
          yamllint --version
          yamllint hetrixtools-agent/config.yaml repository.yaml .github
      # bats is not part of the runner image; install only if it is missing.
      - name: bats
        run: |
          command -v bats >/dev/null || {
            sudo apt-get update && sudo apt-get install -y bats
          }
          bats tests/render-config.bats tests/dry-run.bats
